    <style>

      html:not(.dark) body { background-color: #F4F1EA; color: #1F2937; }
      html.dark body { background-color: #0E1117; color: #E6EDF3; }
      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: background-color 250ms ease-out, color 250ms ease-out;
      }
    </style>
    <script>
      // Apply persisted theme BEFORE React mounts to avoid FOUC.
      (function () {
        try {
          var stored = localStorage.getItem("cv-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          if (theme === "dark") {
            document.documentElement.classList.remove("light");
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
            document.documentElement.classList.add("light");
          }
        } catch (e) {
          // localStorage may be unavailable
        }
      })();
    </script>
